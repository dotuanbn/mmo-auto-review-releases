name: Build & Release (Windows + macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build app (Vite)
        run: npx vite build
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      - name: Build Windows (nsis + portable) + Publish to GitHub Release
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=4096'

      - name: List artifacts (win)
        run: dir release\* 2>$null || echo "No release dir"

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build app (Vite)
        run: npx vite build
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      - name: Build macOS (dmg + zip x64/arm64) + Publish to GitHub Release
        run: npx electron-builder --mac --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=4096'

      - name: List artifacts (mac)
        run: ls -la release/*.dmg release/*.zip release/*.yml 2>/dev/null || echo "List done"
