name: Build macOS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload assets to (e.g. v1.0.6)'
        required: true
        default: 'v1.0.6'

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build app
        run: npx vite build

      - name: Build macOS installer
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List release artifacts
        run: ls -la release/*.dmg 2>/dev/null || echo "No DMG found"; ls -la release/*.zip 2>/dev/null || echo "No ZIP found"

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
